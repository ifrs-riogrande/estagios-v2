<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/img/fav.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administração — SGE IFRS Campus Rio Grande</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">

  <!-- Google Identity Services (necessário para revogar o token no logout) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Mega menu do Admin — baseado no card "Configurações" de admin/index.html
       da v1 (os outros 5 cards da v1 foram para a Central de Estágios). Só 5
       destinos, sem necessidade de agrupar: todos viram links diretos. */
    .header-brand-group { display: flex; align-items: center; gap: var(--space-5); flex-wrap: wrap; }
    .mega-nav-link { display: inline-flex; align-items: center; gap: 6px; padding: 14px 4px; font-size: var(--font-size-sm); font-weight: 600; color: var(--color-text); text-decoration: none; border-bottom: 2.5px solid transparent; transition: color .15s, border-color .15s; }
    a.mega-nav-link:hover { color: #2e7d32; }
    .mega-nav-link.is-current { color: #2e7d32; border-bottom-color: #2e7d32; }
  </style>
</head>
<body>

  <header id="app-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-brand-group">
          <a href="../index.html" class="header-brand">
            <span class="header-logo-wrap"><img src="../assets/img/logo-ifrs.png" alt="IFRS" class="header-logo"></span>
          </a>
          <a href="cursos.html" class="mega-nav-link">Cursos</a>
          <a href="prazos.html" class="mega-nav-link">Prazos</a>
          <a href="notificacoes.html" class="mega-nav-link">Notificações</a>
          <a href="acesso.html" class="mega-nav-link">Configurações de Acesso</a>
          <a href="tce.html" class="mega-nav-link">TCE — Apólice e Logo</a>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <div id="header-user-area"></div>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section class="page-hero">
      <div class="container">
        <h1 class="page-hero-title">Administração</h1>
        <p class="page-hero-desc">
          Configurações gerais do sistema de estágios: cursos, prazos, notificações, acessos e TCE.
        </p>
      </div>
    </section>
  </main>

  <footer id="app-footer">
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">
          &copy; <span id="footer-year"></span> Central de Estágios — IFRS Campus Rio Grande
        </span>
        <nav class="footer-links" aria-label="Links do rodapé">
          <a href="mailto:estagios@riogrande.ifrs.edu.br">estagios@riogrande.ifrs.edu.br</a>
        </nav>
      </div>
    </div>
  </footer>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/notifications-bell.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Guarda de acesso: por enquanto exige só sessão de servidor (qualquer
    // @riogrande...). A checagem do papel "Admin" de verdade acontece no
    // backend, na ConfigAcesso — ainda não há dados reais lá.
    document.addEventListener('DOMContentLoaded', function () {
      requireAreaAuth('servidor', '../index.html');
    });
  </script>
</body>
</html>
