<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/img/fav.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diretoria de Extensão — DEX — SGE IFRS Campus Rio Grande</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">

  <!-- Google Identity Services (necessário para revogar o token no logout) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ═══════════════════════════════════════
       HEADER — logo à esquerda; sino, perfil e voltar à direita (igual v1)
       ═══════════════════════════════════════ -->
  <header id="app-header">
    <div class="container">
      <div class="header-inner">
        <a href="../index.html" class="header-brand">
          <span class="header-logo-wrap"><img src="../assets/img/logo-ifrs.png" alt="IFRS" class="header-logo"></span>
        </a>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <div id="header-user-area"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       CONTEÚDO — em construção
       ═══════════════════════════════════════ -->
  <main id="main-content">
    <section class="page-hero">
      <div class="container">
        <h1 class="page-hero-title">Diretoria de Extensão — DEX</h1>
        <p class="page-hero-desc">
          Pareceres finais de estágio não obrigatório aguardando assinatura.
        </p>
      </div>
    </section>

    <div class="container">
      <div class="construcao">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" class="construcao__icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/>
        </svg>
        <h2 class="construcao__titulo">Em construção</h2>
        <p class="construcao__desc">Os pareceres pendentes de assinatura da DEX serão adicionados aqui.</p>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════ -->
  <footer id="app-footer">
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">
          &copy; <span id="footer-year"></span> Central de Estágios — IFRS Campus Rio Grande
        </span>
        <nav class="footer-links" aria-label="Links do rodapé">
          <a href="mailto:estagios@riogrande.ifrs.edu.br">estagios@riogrande.ifrs.edu.br</a>
        </nav>
      </div>
    </div>
  </footer>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/notifications-bell.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Guarda de acesso: por enquanto exige só sessão de servidor (qualquer
    // @riogrande...). A checagem do papel "DEX" de verdade acontece no
    // backend, na ConfigAcesso — ainda não há dados reais lá.
    document.addEventListener('DOMContentLoaded', function () {
      requireAreaAuth('servidor', '../index.html');
    });
  </script>
</body>
</html>
