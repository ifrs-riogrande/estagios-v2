<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/img/fav.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diretor Geral — SGE IFRS Campus Rio Grande</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/layout.css">

  <!-- Google Identity Services (necessário para revogar o token no logout) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- ═══════════════════════════════════════
       HEADER — logo à esquerda; sino, perfil e voltar à direita (igual v1)
       ═══════════════════════════════════════ -->
  <header id="app-header">
    <div class="container">
      <div class="header-inner">
        <a href="../index.html" class="header-brand">
          <span class="header-logo-wrap"><img src="../assets/img/logo-ifrs.png" alt="IFRS" class="header-logo"></span>
        </a>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          <div id="header-user-area"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       CONTEÚDO — em construção
       ═══════════════════════════════════════ -->
  <main id="main-content">
    <section class="page-hero">
      <div class="container">
        <h1 class="page-hero-title">Diretor Geral</h1>
        <p class="page-hero-desc">
          Assinatura final dos processos de estágio.
        </p>
      </div>
    </section>

    <div class="container" style="padding-top:var(--space-6);padding-bottom:var(--space-12);">

      <div id="painel-carregando" class="empty-state">
        <div class="spinner" aria-hidden="true"></div>
        <p>Carregando…</p>
      </div>

      <div id="lista-vazia" class="empty-state hidden">
        <p>Nenhum TCE aguardando sua assinatura no momento.</p>
      </div>

      <div id="lista-pendentes"></div>

    </div>
  </main>

  <!-- Modal: Assinatura do TCE — Direção-Geral -->
  <div class="modal-backdrop" id="modal-assinatura">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-assinatura-titulo">Assinatura do TCE</h2>
        <button type="button" class="modal-close" id="modal-assinatura-fechar" aria-label="Fechar">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modal-assinatura-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="btn-fechar-assinatura">Fechar</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════ -->
  <footer id="app-footer">
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">
          &copy; <span id="footer-year"></span> Central de Estágios — IFRS Campus Rio Grande
        </span>
        <nav class="footer-links" aria-label="Links do rodapé">
          <a href="mailto:estagios@riogrande.ifrs.edu.br">estagios@riogrande.ifrs.edu.br</a>
        </nav>
      </div>
    </div>
  </footer>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/assinaturas.js"></script>
  <script src="../assets/js/notifications-bell.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    var _pendentes = [];

    // Guarda de acesso: por enquanto exige só sessão de servidor (qualquer
    // @riogrande...). A checagem do papel "Diretor Geral" de verdade
    // acontece no backend, na ConfigAcesso — ainda não há dados reais lá.
    document.addEventListener('DOMContentLoaded', function () {
      requireAreaAuth('servidor', '../index.html');
      carregarPendentes();
      document.getElementById('modal-assinatura-fechar').addEventListener('click', fecharModal);
      document.getElementById('btn-fechar-assinatura').addEventListener('click', fecharModal);
      document.getElementById('modal-assinatura').addEventListener('click', function (e) { if (e.target === this) fecharModal(); });
    });

    function carregarPendentes() {
      document.getElementById('painel-carregando').classList.remove('hidden');
      document.getElementById('lista-vazia').classList.add('hidden');
      API.get('listarFluxosPendentesAtor', { ator: 'direcao' }).then(function (lista) {
        _pendentes = Array.isArray(lista) ? lista : [];
        document.getElementById('painel-carregando').classList.add('hidden');

        if (!_pendentes.length) {
          document.getElementById('lista-vazia').classList.remove('hidden');
          document.getElementById('lista-pendentes').innerHTML = '';
          return;
        }

        document.getElementById('lista-pendentes').innerHTML = _pendentes.map(function (p) {
          var prazoHtml = '';
          if (p.prazoVencimento) {
            var dias = Math.round((new Date(p.prazoVencimento) - new Date()) / 86400000);
            var cls = dias < 0 ? 'badge-error' : dias <= 3 ? 'badge-warning' : 'badge-neutral';
            prazoHtml = '<span class="badge ' + cls + '" style="margin-left:var(--space-2);">Prazo: ' + escapeHtml(formatDateBR(p.prazoVencimento)) + '</span>';
          }
          return '<div class="card" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-3);padding:var(--space-4);">' +
            '<div>' +
            '<div style="font-weight:600;margin-bottom:2px;">' + escapeHtml(p.nomeEstudante || '—') + prazoHtml + '</div>' +
            '<div style="font-size:var(--font-size-xs);color:var(--color-text-muted);">' + escapeHtml(p.curso || '—') + ' · ' + escapeHtml(p.empresa || '—') + ' · ' + escapeHtml(p.tipoEstagio || '—') + '</div>' +
            '</div>' +
            '<button type="button" class="btn btn-primary btn-sm" data-id="' + escapeHtml(p.id || '') + '">Ir para Assinatura</button>' +
            '</div>';
        }).join('');
      }).catch(function (err) {
        document.getElementById('painel-carregando').classList.add('hidden');
        document.getElementById('lista-pendentes').innerHTML =
          '<div class="alert alert-error"><div class="alert-content">Não foi possível carregar os TCEs pendentes. ' + escapeHtml(err.message) + '</div></div>';
      });
    }

    document.getElementById('lista-pendentes').addEventListener('click', function (e) {
      var btn = e.target.closest('button[data-id]');
      if (!btn) return;
      abrirAssinatura(btn.dataset.id);
    });

    async function abrirAssinatura(idEstagio) {
      document.getElementById('modal-assinatura-titulo').textContent = 'Assinatura do TCE';
      document.getElementById('modal-assinatura-body').innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
      document.getElementById('modal-assinatura').classList.add('is-open');
      try {
        var fluxo = await API.get('obterFluxoAssinaturas', { id: idEstagio });
        renderAssinatura(fluxo, idEstagio);
      } catch (err) {
        document.getElementById('modal-assinatura-body').innerHTML =
          '<div class="alert alert-error"><div class="alert-content">Erro ao carregar: ' + escapeHtml(err.message) + '</div></div>';
      }
    }

    function renderAssinatura(fluxo, idEstagio) {
      var etapaAtual = fluxo.etapas[fluxo.etapaAtual - 1];
      var ehMinhaVez = etapaAtual && etapaAtual.ator === 'direcao' && etapaAtual.status === 'aguardando';

      var body = document.getElementById('modal-assinatura-body');
      body.innerHTML = renderTimelineAssinaturas(fluxo) + renderHistoricoRejeicoes(fluxo) +
        (ehMinhaVez ? '<div id="assinatura-painel-govbr" style="margin-top:var(--space-4);"></div>' : '');

      body.querySelectorAll('[data-baixar-etapa]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          baixarPdfAssinaturaEtapa({ id: idEstagio, etapa: btn.dataset.baixarEtapa });
        });
      });

      if (ehMinhaVez) {
        montarPainelGovBr(document.getElementById('assinatura-painel-govbr'), etapaAtual, {
          onBaixar: function () { baixarPdfAssinaturaEtapa({ id: idEstagio, etapa: etapaAtual.numero }); },
          onEnviar: async function (pdfBase64) {
            await API.post('uploadPdfAssinado', { idEstagio: idEstagio, numeroEtapa: etapaAtual.numero, pdfBase64: pdfBase64 });
            showToast('✅ PDF assinado enviado.', 'success');
            fecharModal();
            carregarPendentes();
          },
        });
      }
    }

    function fecharModal() {
      document.getElementById('modal-assinatura').classList.remove('is-open');
    }
  </script>
</body>
</html>
