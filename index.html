<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/img/fav.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistema de Gestão de Estágios — IFRS Campus Rio Grande">
  <title>Central de Estágios — IFRS Campus Rio Grande</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/layout.css">

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* Estilos específicos da home/login — layout em painel dividido */

    .home-main {
      padding: 0;
      min-height: calc(100vh - 64px - 56px);
    }

    .split-wrap {
      display: flex;
      min-height: calc(100vh - 64px - 56px);
      width: 100%;
    }

    .split-left {
      flex: 1 1 62%;
      background: #eef1f4;
      display: flex;
      align-items: center;
      padding-top: var(--space-8);
      padding-bottom: var(--space-8);
      padding-right: var(--space-10, 64px);
      /* Mesma conta que o .container do header usa — alinha o texto exatamente
         com o logo, em vez de um padding independente que desalinha em telas largas. */
      padding-left: max(var(--space-6), calc((100vw - var(--container-xl)) / 2 + var(--space-6)));
      position: relative;
      overflow: hidden;
    }

    /* bolinhas brancas*/
    .split-left-blob {
      position: absolute;
      width: 380px;
      height: 300px;
      right: -60px;
      bottom: -50px;
      border-radius: 58% 42% 63% 37% / 45% 55% 45% 55%;
      background-image: radial-gradient(circle, #ffffff 1.5px, transparent 1.5px);
      background-size: 18px 18px;
      z-index: 0;
    }

    .split-left > .home-headline {
      position: relative;
      z-index: 1;
    }

    .split-right {
      flex: 1 1 38%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-8) var(--space-6);
    }

    @media (max-width: 800px) {
      .split-wrap { flex-direction: column; min-height: auto; }
      .split-left, .split-right { flex: initial; width: 100%; padding: var(--space-8) var(--space-6); }
    }

    .home-headline {
      text-align: left;
      max-width: 480px;
    }

    .home-eyebrow {
      font-size: var(--font-size-md);
      font-weight: 800;
      color: #2e7d32;
      margin-bottom: var(--space-3);
    }

    .home-eyebrow-bem {
      display: inline-block;
      padding-bottom: 2px;
      border-bottom: 2.5px solid #2e7d32;
    }

    .home-headline h1 {
      font-size: 46px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.08;
      color: var(--color-text);
    }

    .home-headline h1 span {
      color: #1565c0;
    }

    .home-headline h1 span em {
      font-style: normal;
      color: #2e7d32;
    }

    .home-headline .home-desc {
      margin-top: var(--space-4);
      font-size: var(--font-size-lg, 18px);
      color: var(--color-text-muted);
    }

    @media (max-width: 480px) {
      .home-headline h1 { font-size: var(--font-size-xl); }
    }

    /* Painel de login — sem cartão próprio, o painel branco já dá o contraste */
    .login-panel {
      width: 100%;
      max-width: 380px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-3);
    }

    .login-panel h2 {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text);
    }

    .login-panel .login-subtitle {
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
      margin-top: -4px;
    }

    .login-panel .btn-lg {
      padding: 18px 36px;
      font-size: 18px;
      margin-top: var(--space-3);
      border-radius: 9999px;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .login-panel .btn-lg:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26, 58, 107, .25);
    }

    .login-panel .btn-lg svg {
      width: 22px;
      height: 22px;
    }

    .login-panel .login-domains {
      color: var(--color-text-muted);
      font-size: 12.5px;
      margin-top: var(--space-2);
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════
       HEADER
       ═══════════════════════════════════════ -->
  <header id="app-header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="header-brand">
          <span class="header-logo-wrap"><img src="assets/img/logo-ifrs.png" alt="IFRS" class="header-logo"></span>
        </a>
        <div style="display:flex;align-items:center;gap:var(--space-3)">
          <a href="ajuda/index.html" class="header-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>
            Ajuda
          </a>
          <div id="header-user-area"></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       CONTEÚDO PRINCIPAL — Login único do sistema
       ═══════════════════════════════════════ -->
  <main class="home-main">
    <div class="split-wrap">
      <div class="split-left">
        <div class="split-left-blob" aria-hidden="true"></div>
        <div class="home-headline">
          <p class="home-eyebrow"><span class="home-eyebrow-bem">Bem</span>-vindo(a)!</p>
          <h1>Sistema de<br><span>Gestão de Estágios <em>SGE</em></span></h1>
          <p class="home-desc">Gerencie seu estágio de forma rápida, prática e segura.</p>
        </div>
      </div>

      <div class="split-right">
        <div id="login-area" class="login-panel">
          <!-- Preenchido via JS: título + botão de login -->
        </div>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════ -->
  <footer id="app-footer">
    <div class="container">
      <div class="footer-inner">
        <span class="footer-copy">
          &copy; <span id="footer-year"></span> Central de Estágios — IFRS Campus Rio Grande
        </span>
        <nav class="footer-links" aria-label="Links do rodapé">
          <a href="mailto:estagios@riogrande.ifrs.edu.br">estagios@riogrande.ifrs.edu.br</a>
        </nav>
      </div>
    </div>
  </footer>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    /**
     * Servidor pode ter um papel institucional configurado no backend
     * (Central de Estágios, Admin, DEX, DEN, Diretor Geral, Registro
     * Acadêmico, NAPNE) — só o backend sabe disso (aba ConfigAcesso),
     * nunca o front-end. Se a checagem falhar por qualquer motivo (ex:
     * backend ainda não publicado), cai no caminho padrão de servidor
     * comum — nunca concede acesso elevado por causa de uma falha.
     */
    async function obterDestinoPosLogin(userArea, session) {
      const caminhoPadrao = getAreaPath(userArea);
      if (userArea !== 'servidor') return caminhoPadrao;

      try {
        const resp = await API.get('verificarAreaServidor', { authToken: session.token });
        return (resp && resp.caminho) || caminhoPadrao;
      } catch (_) {
        return caminhoPadrao;
      }
    }

    function renderLoginButton() {
      const area = document.getElementById('login-area');
      area.innerHTML = `
        <h2>Acesse sua conta</h2>
        <p class="login-subtitle">Use seu e-mail institucional para continuar.</p>
        <button id="btn-google-login" class="btn btn-primary btn-lg">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Entrar com Google
        </button>
        <p class="login-domains">
          Estudantes: <strong>@aluno.riogrande.ifrs.edu.br</strong><br>
          Servidores: <strong>@riogrande.ifrs.edu.br</strong>
        </p>
      `;

      document.getElementById('btn-google-login').addEventListener('click', () => {
        const btn = document.getElementById('btn-google-login');
        btn.classList.add('is-loading');
        btn.disabled = true;

        requestLogin(
          async (session) => {
            const userArea = getUserArea(session.email);
            const path = getAreaPath(userArea);
            if (!path) {
              clearSession();
              btn.classList.remove('is-loading');
              btn.disabled = false;
              const errEl = document.createElement('p');
              errEl.className = 'text-sm text-error';
              errEl.textContent = `O e-mail ${session.email} não pertence a nenhum domínio institucional reconhecido (@aluno.riogrande.ifrs.edu.br ou @riogrande.ifrs.edu.br).`;
              btn.parentNode.appendChild(errEl);
              return;
            }
            window.location.href = await obterDestinoPosLogin(userArea, session);
          },
          (errorMsg) => {
            btn.classList.remove('is-loading');
            btn.disabled = false;
            const errEl = document.createElement('p');
            errEl.className = 'text-sm text-error';
            errEl.textContent = errorMsg;
            btn.parentNode.appendChild(errEl);
          }
        );
      });
    }

    // ── Ponto de entrada ──
    (async function init() {
      const session = getSession();
      const userArea = session ? getUserArea(session.email) : null;
      if (userArea) {
        window.location.href = await obterDestinoPosLogin(userArea, session);
      } else {
        renderLoginButton();
      }
    })();
  </script>
</body>
</html>
